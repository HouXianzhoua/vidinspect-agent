thresholds:
  min_width: 640
  min_height: 480
  min_fps: 15
  max_fps: 120
  min_duration_sec: 0.5
  max_black_frame_ratio: 0.3
  max_static_frame_ratio: 0.5

checks:
  metadata: true
  integrity: true
  visual: true
  static: true
  dup_frame: true
  jump: true
  endpoint_static: true   # 规范3：开始/结束归位停留时间长
  freeze: true            # 规范5：画面卡死（长时间卡帧）
  noise: true             # 规范11：严重噪点
  gripper_offscreen: false  # 规范12：夹爪出境（Gemini 付费远程调用，默认关闭，需设 GEMINI_API_KEY 并开启）
  regrasp: false            # 规范1：二次抓取（多模态付费远程调用，默认关闭，需设对应 API key 并开启）

# 静态 / 无效操作检测（移植自 video_quality_pipeline static_arm）
static:
  severity: warn        # 命中时的严重级别：warn / fail
  backend: lite         # lite=纯 CPU 帧差；raft=GPU 稠密光流（更准，需 RAFT 源码+权重）
  thr: 0.30             # lite：motion_score 低于此值判为静止
  n_frames: 32          # lite：采样帧数
  max_h: 240            # 下采样高度（两种后端共用）
  # ---- raft 后端参数（backend: raft 时生效）----
  raft_thr: 0.10        # raft：active_ratio 低于此值判为静止（已标定）
  raft_n_frames: 40     # raft：采样帧数
  raft_iters: 12        # RAFT 迭代步数
  raft_batch_size: 40   # 光流批大小（OOM 自动减半）
  # device: cuda        # 不填则自动：有 GPU 用 cuda，否则 cpu
  # raft_repo: /path/to/RAFT         # RAFT 源码目录（含 core/raft.py）
  # raft_model_path: /path/to/raft-sintel.pth   # 权重，缺省取 <raft_repo>/models/raft-sintel.pth

# 重复帧 / 卡顿检测（移植自 video_quality_pipeline stutter_detect）
dup_frame:
  severity: warn
  diff_thr: 0.5
  strict_thr: 0.05
  keep_ratio_thr: 0.20
  mean_gap_thr: 6.0
  ratio_strict_thr: 0.095
  keep_ratio_lo: 0.15
  mid_gap_ratio_thr: 0.45
  static_keep_ratio_thr: 0.09
  fps_ref: 20.0         # 阈值标定基准帧率
  strict_fps_pow: 1.5
  mean_gap_cap: 16.0
  downscale: [64, 48]
  timeout: 60.0

# 跳帧 / 瞬移检测（移植自 video_quality_pipeline jump_frame）
jump:
  severity: warn
  peak_abs_min: 3.0
  frozen_mean: 0.05
  sustained_run: 4
  edge_frames: 1
  edge_bg_max: 0.6
  isolation_mode: auto  # auto / all / agibot / off
  isolation_min: 2.5
  high_run_max: 1
  static_bg_max: 0.6
  thresholds:
    __default__: 4.0    # 无机器人标签时使用

# 开始/结束归位停留时间过长检测（质检规范序号 3）
endpoint_static:
  severity: warn        # 命中时的严重级别：warn / fail
  max_static_sec: 2.0   # 开头或结尾静止时长超过此秒数即命中
  # 自适应静止阈值 motion_thr_eff = max(abs_floor, p10 + rel_frac*(p90-p10))
  abs_floor: 0.3        # 静止阈值绝对下限（相邻帧 mean|ΔY|, 0-255）
  rel_frac: 0.35        # 相对该视频运动区间(p10~p90)的比例
  downscale: [64, 48]   # ffmpeg 下采样尺寸
  timeout: 60.0

# 画面卡死 / 长时间卡帧检测（质检规范序号 5）
freeze:
  severity: warn
  freeze_thr: 0.1       # 相邻帧 mean|ΔY|(0-255) 低于此判为冻结（近似同一帧）
  max_freeze_sec: 2.0   # 单段最长连续冻结超过此秒数即命中
  downscale: [64, 48]
  timeout: 60.0

# 注：质检规范序号 6（画面掉帧 / 多段短时卡帧 / 慢放）已由 dup_frame 覆盖
#（规则 A periodic_stutter + 规则 B 时间变慢），无需单独检测器。

# 严重噪点检测（质检规范序号 11，Immerkær 噪声方差估计）
noise:
  severity: warn
  max_noise_sigma: 8.0  # 噪声标准差(0-255)中位数超过此值即命中
  n_frames: 16          # 采样帧数
  max_h: 720            # 采样帧最大高度（过度下采样会削弱噪点，保留较高分辨率）

# 夹爪出境检测（质检规范序号 12，多模态）
# 注意：调用付费多模态 API，需安装依赖并设置对应 API key，同时把 checks.gripper_offscreen 设为 true。
#   gemini: pip install -e ".[gemini]"  + 环境变量 GEMINI_API_KEY
#   openai: pip install -e ".[openai]"  + 环境变量 OPENAI_API_KEY
# 缺 key / SDK / 接口异常 / 后端不支持该模式时降级为 WARN，不阻塞流水线。
gripper_offscreen:
  severity: warn
  mode: image               # image=本地抽帧逐帧判定（默认，1s 分辨率更稳、可跨厂商）；
                            # video=整段视频交模型返回出镜区间（依赖原生视频理解，目前仅 gemini）
  provider: gemini          # gemini / openai
  sample_fps: 2.0           # image：抽帧采样率（决定 1s 阈值的时间分辨率，建议 >=2）
  frame_max_h: 360          # image：抽帧下采样高度（省 token）
  max_frames: 120           # image：单视频抽帧上限（长视频自动降采样以覆盖全片）
  min_offscreen_sec: 1.0    # 夹爪连续出镜超过此秒数即命中
  min_confidence: 0.5       # video：出镜区间置信度过滤阈值
  temperature: 0.0
  timeout: 120.0
  gemini:
    model: gemini-2.5-flash   # 也可用 gemini-3.5-flash 等多模态模型
    api_key_env: GEMINI_API_KEY
  openai:
    model: gpt-4o             # 任意支持视觉的 OpenAI 多模态模型
    api_key_env: OPENAI_API_KEY

# 二次抓取检测（质检规范序号 1，多模态）
# 思路：本地抽帧 → 模型逐帧、逐夹爪回 {side, holding, object_label, confidence} → 代码侧
#   按机械臂(left/right/single)分别去抖后统计该臂的独立"持有段"数，某臂 ≥2 段(被真释放
#   隔开)即判二次抓取。每只机械臂单目标，故双臂各抓一次(含 A→B 交接)正常、不误报。判定确定可复现。
# 注意：调用付费多模态 API，需安装对应后端依赖并设置 API key，同时把 checks.regrasp 设为 true。
#   gemini: pip install -e ".[gemini]" + 环境变量 GEMINI_API_KEY
#   openai: pip install -e ".[openai]" + 环境变量 OPENAI_API_KEY
# 缺 key / SDK / 接口异常 / 抽帧失败时降级为 WARN，不阻塞流水线。
regrasp:
  severity: warn
  provider: gemini          # gemini / openai（仅 image 逐帧模式）
  sample_fps: 2.0           # 抽帧采样率（建议 >=2，决定抓取/释放的时间分辨率）
  frame_max_h: 360          # 抽帧下采样高度（省 token）
  max_frames: 120           # 单视频抽帧上限（长视频自动降采样以覆盖全片）
  min_hold_sec: 0.5         # 一段"持有"至少持续这么久才算一次有效抓取（去抖，过滤误检；下限 2 帧）
  min_release_sec: 1.0      # 两次持有之间的"释放"至少持续这么久才算真释放（桥接遮挡闪断；下限 2 帧）
  min_confidence: 0.0       # 低于此置信度的"持有"判定按未持有处理（0=不启用）
  temperature: 0.0
  timeout: 120.0
  gemini:
    model: gemini-2.5-flash
    api_key_env: GEMINI_API_KEY
  openai:
    model: gpt-4o
    api_key_env: OPENAI_API_KEY

output:
  fail_on_error: true
  include_passed: false
