thresholds:
  min_width: 640
  min_height: 480
  min_fps: 15
  max_fps: 120
  min_duration_sec: 0.5
  max_black_frame_ratio: 0.3
  max_static_frame_ratio: 0.5

# LeRobot v3.0 数据集摄入 / 编排层（docs/detector_dataset_impact.md §1）
# 自动识别含 meta/info.json 的数据组，逐组读取真实参数并把组级信息
#（robot / task / 目标物体 / 声明视频规格 / 标定齐全性 / 对应 parquet 指针）注入每个视频的
# metadata。jump 的 robot 阈值、colormatch 的 task/target_objects 钩子据此自动生效。
# 非 LeRobot 组（普通 mp4）自动退化为纯视频检测；逐帧 parquet 数组按需读取（需 pyarrow）。
lerobot:
  enabled: true

checks:
  metadata: true
  integrity: true
  visual: true
  static: true
  dup_frame: true
  jump: true
  endpoint_static: true   # 规范3：开始/结束归位停留时间长
  freeze: true            # 规范5：画面卡死（长时间卡帧）
  noise: true             # 规范11：严重噪点
  brightness: true        # 规范20子项：画面过暗/欠曝
  gripper_offscreen: false  # 规范12：夹爪出境（Gemini 付费远程调用，默认关闭，需设 GEMINI_API_KEY 并开启）
  regrasp: false            # 规范1：二次抓取（多模态付费远程调用，默认关闭，需设对应 API key 并开启）
  object_slip: false        # 规范21：物体滑落（多模态付费远程调用，默认关闭，需设对应 API key 并开启）
  colormatch: false         # 规范19：操作物与桌面同色（多模态付费远程调用，默认关闭，需设对应 API key 并开启）
  edge_grasp: false         # 规范16：夹取位置过于极限（多模态付费远程调用，默认关闭，需设对应 API key 并开启）

# 元数据检查（分辨率 / 帧率 / 时长 + 声明 vs 实测交叉核对）
metadata:
  # 「声明 vs 实测」（§3）：LeRobot info.json 声明的 codec/分辨率/fps/pix_fmt/has_audio
  # 与 ffprobe 实测交叉核对。仅在 LeRobot 组内（有声明值）时产生 spec_match 项；纯 mp4 跳过。
  spec_match: true
  spec_match_severity: warn   # 声明与实测不一致时的严重级别：warn / fail
  fps_tol: 1.0                # fps 允许的数值偏差（声明 30 实测 29.97 不算不一致）

# 静态 / 无效操作检测（移植自 video_quality_pipeline static_arm）
static:
  severity: warn        # 命中时的严重级别：warn / fail
  backend: lite         # lite=纯 CPU 帧差；raft=GPU 稠密光流（更准，需 RAFT 源码+权重）；
                        # joint=LeRobot parquet 关节地面真值（绕开像素帧差的小目标漏判，见 §2.1）
  thr: 0.30             # lite：motion_score 低于此值判为静止
  n_frames: 32          # lite：采样帧数
  max_h: 240            # 下采样高度（两种后端共用）
  # ---- joint 后端参数（backend: joint 时生效，读同 episode 的 puppet 关节信号）----
  joint_range_thr: 0.05    # rad：整段所有臂关节稳健峰峰值(q99-q01)均 < 此值判为静止
  joint_move_speed: 0.005  # rad/帧：判定单帧"在动"的关节速度阈值（仅用于报告 moving_ratio）
  joint_fallback: lite     # parquet 缺失/不可读时回退后端：lite / raft / none
  # ---- raft 后端参数（backend: raft 时生效）----
  raft_thr: 0.10        # raft：active_ratio 低于此值判为静止（已标定）
  raft_n_frames: 40     # raft：采样帧数
  raft_iters: 12        # RAFT 迭代步数
  raft_batch_size: 40   # 光流批大小（OOM 自动减半）
  # device: cuda        # 不填则自动：有 GPU 用 cuda，否则 cpu
  # raft_repo: /path/to/RAFT         # RAFT 源码目录（含 core/raft.py）
  # raft_model_path: /path/to/raft-sintel.pth   # 权重，缺省取 <raft_repo>/models/raft-sintel.pth

# 重复帧 / 卡顿检测（移植自 video_quality_pipeline stutter_detect）
dup_frame:
  severity: warn
  diff_thr: 0.5
  strict_thr: 0.05
  keep_ratio_thr: 0.20
  mean_gap_thr: 6.0
  ratio_strict_thr: 0.095
  keep_ratio_lo: 0.15
  mid_gap_ratio_thr: 0.45
  static_keep_ratio_thr: 0.09
  fps_ref: 20.0         # 阈值标定基准帧率
  strict_fps_pow: 1.5
  mean_gap_cap: 16.0
  downscale: [64, 48]
  timeout: 60.0
  prefer_declared_fps: true  # §3：fps 归一化优先用 info.json 声明帧率（更权威），缺省退回实测

# 跳帧 / 瞬移检测（移植自 video_quality_pipeline jump_frame）
jump:
  severity: warn
  peak_abs_min: 3.0
  frozen_mean: 0.05
  sustained_run: 4
  edge_frames: 1
  edge_bg_max: 0.6
  isolation_mode: auto  # auto / all / agibot / off
  isolation_min: 2.5
  high_run_max: 1
  static_bg_max: 0.6
  # §3 可选关节交叉验证（默认关闭）：像素峰值帧处关节也跳变才确认，抑制编码/光照伪跳变。
  # 需 §1 摄入层提供 parquet 指针（LeRobot 组内）。robot 阈值表已由摄入层填 robot 自动生效。
  joint_cross_validate: false
  joint_ratio_min: 3.0  # 峰值帧关节速度 / 速度中位数 的下限（低于此视为关节无跳变）
  thresholds:
    __default__: 4.0    # 无机器人标签时使用

# 开始/结束归位停留时间过长检测（质检规范序号 3）
endpoint_static:
  severity: warn        # 命中时的严重级别：warn / fail
  max_static_sec: 2.0   # 开头或结尾静止时长超过此秒数即命中
  # 自适应静止阈值 motion_thr_eff = max(abs_floor, p10 + rel_frac*(p90-p10))
  abs_floor: 0.3        # 静止阈值绝对下限（相邻帧 mean|ΔY|, 0-255）
  rel_frac: 0.35        # 相对该视频运动区间(p10~p90)的比例
  downscale: [64, 48]   # ffmpeg 下采样尺寸
  timeout: 60.0
  # §3：有 LeRobot 关节数据时以关节首尾静止时长为准（关节是归位静止的地面真值，绕开
  # 64×48 像素自适应阈值的脆弱性）；缺关节时退回像素。末尾「归位」子任务段记入 details。
  joint_cross_validate: true
  joint_move_speed: 0.005  # rad/帧：关节速度低于此视为「几乎不动」

# 画面卡死 / 长时间卡帧检测（质检规范序号 5）
freeze:
  severity: warn
  freeze_thr: 0.1       # 相邻帧 mean|ΔY|(0-255) 低于此判为冻结（近似同一帧）
  max_freeze_sec: 2.0   # 单段最长连续冻结超过此秒数即命中
  downscale: [64, 48]
  timeout: 60.0
  # §3：腕部相机(camera_left/right)随对应臂运动，画面冻结但该臂关节在动 → 画面/关节不一致
  #（规范18）。有 LeRobot 关节时据此区分「真冻结」与「画面不一致」，记入 details 并细化命中文案。
  joint_cross_validate: true
  joint_move_speed: 0.005  # rad/帧：关节速度高于此视为「在动」

# 注：质检规范序号 6（画面掉帧 / 多段短时卡帧 / 慢放）已由 dup_frame 覆盖
#（规则 A periodic_stutter + 规则 B 时间变慢），无需单独检测器。

# 严重噪点检测（质检规范序号 11，Immerkær 噪声方差估计）
noise:
  severity: warn
  max_noise_sigma: 8.0  # 噪声标准差(0-255)中位数超过此值即命中
  n_frames: 16          # 采样帧数
  max_h: 720            # 采样帧最大高度（过度下采样会削弱噪点，保留较高分辨率）

# 画面过暗 / 欠曝检测（质检规范序号 20 子项：相机画面问题）
# 只判"整体偏暗但非全黑"的欠曝画面；纯黑归 visual(blackdetect)，花屏归 integrity，
# 偏色/白平衡误报率高暂不实现。全画面平均亮度中位数低于 min_luma 即命中。
brightness:
  severity: warn
  min_luma: 40.0        # 全帧平均亮度(0-255)中位数下限（无 stats 基线时的固定阈值，也是 fallback）
  n_frames: 16          # 采样帧数
  max_h: 240            # 采样帧下采样高度
  # §3：有 stats.json 时用该数据源的像素均值作基线，阈值=baseline*baseline_rel_frac，
  # 替代写死的 40（不同数据源/机位正常亮度差异大）。缺 stats 基线时退回固定 min_luma。
  use_stats_baseline: true
  baseline_rel_frac: 0.4

# 夹爪出境检测（质检规范序号 12，多模态）
# 注意：调用付费多模态 API，需安装依赖并设置对应 API key，同时把 checks.gripper_offscreen 设为 true。
#   gemini: pip install -e ".[gemini]"  + 环境变量 GEMINI_API_KEY
#   openai: pip install -e ".[openai]"  + 环境变量 OPENAI_API_KEY
# 缺 key / SDK / 接口异常 / 后端不支持该模式时降级为 WARN，不阻塞流水线。
gripper_offscreen:
  severity: warn
  mode: image               # image=本地抽帧逐帧判定（默认，1s 分辨率更稳、可跨厂商）；
                            # video=整段视频交模型返回出镜区间（依赖原生视频理解，目前仅 gemini）
  provider: gemini          # gemini / openai
  sample_fps: 2.0           # image：抽帧采样率（决定 1s 阈值的时间分辨率，建议 >=2）
  frame_max_h: 360          # image：抽帧下采样高度（省 token）
  max_frames: 120           # image：单视频抽帧上限（长视频自动降采样以覆盖全片）
  min_offscreen_sec: 1.0    # 夹爪连续出镜超过此秒数即命中
  min_confidence: 0.5       # video：出镜区间置信度过滤阈值
  temperature: 0.0
  timeout: 120.0
  gemini:
    model: gemini-2.5-flash   # 也可用 gemini-3.5-flash 等多模态模型
    api_key_env: GEMINI_API_KEY
  openai:
    model: gpt-4o             # 任意支持视觉的 OpenAI 多模态模型
    api_key_env: OPENAI_API_KEY

# 二次抓取检测（质检规范序号 1）
# §2.2 改造：优先用 LeRobot parquet 夹爪开合真实信号逐臂判定（不调模型 / 无需 API key /
#   零付费调用 / 全分辨率）——逐臂单目标，「夹爪闭合段数」即「抓取次数」，某臂 ≥2 段即命中。
#   视频在 LeRobot v3.0 组内、能自定位到同 episode parquet 且装有 pyarrow 时生效。
# 回退：非 LeRobot 布局 / 缺 parquet / 缺 pyarrow / 缺视频 fps / 开合不可判 → 走多模态逐帧路径：
#   本地抽帧 → 模型逐帧、逐夹爪回 {side, holding, object_label, confidence} → 代码侧按机械臂
#   (left/right/single)分别去抖后统计独立"持有段"数。该路径需付费 API（缺 key/SDK/异常降级 WARN）。
# 启用：把 checks.regrasp 设为 true。parquet 路径: pip install -e ".[lerobot]"；
#   模型回退路径: pip install -e ".[gemini]" + GEMINI_API_KEY（或 ".[openai]" + OPENAI_API_KEY）。
regrasp:
  severity: warn
  provider: gemini          # gemini / openai（仅 image 逐帧模式；模型回退路径用）
  sample_fps: 2.0           # 抽帧采样率（建议 >=2，决定抓取/释放的时间分辨率）
  frame_max_h: 360          # 抽帧下采样高度（省 token）
  max_frames: 120           # 单视频抽帧上限（长视频自动降采样以覆盖全片）
  min_hold_sec: 0.5         # 一段"持有"至少持续这么久才算一次有效抓取（去抖，过滤误检；下限 2 帧）
  min_release_sec: 1.0      # 两次持有之间的"释放"至少持续这么久才算真释放（桥接遮挡闪断；下限 2 帧）
  min_confidence: 0.0       # 低于此置信度的"持有"判定按未持有处理（0=不启用；模型回退路径用）
  # ---- parquet 夹爪真实信号（§2.2，已对齐 §1 枢纽）：优先用 LeRobot parquet 逐臂夹爪开合判定 ----
  # 优先用摄入层注入的 parquet 指针 metadata["lerobot"]["parquet_path"]（单一数据源，与 static/
  # object_slip 一致），未经摄入层注入时按视频路径自定位兜底。装 pyarrow 且能定位到同 episode
  # parquet 时优先生效（不调模型）；否则回退到模型逐帧推断路径（行为同改造前）。pip install -e ".[lerobot]"
  use_parquet_gripper: true     # 关闭则始终走模型逐帧推断路径
  gripper_closed_is_low: true   # 夹爪开合值越小=越闭合（多数 LeRobot/RoboMIND 约定；按组实测可改）
  gripper_closed_frac: 0.5      # 归一化开合值 ≤ 此比例判为闭合（closed_is_low 时）
  gripper_min_span: 1.0e-6      # 整段开合区间小于此（夹爪几乎不动）则视为不可判，回退模型
  temperature: 0.0
  timeout: 120.0
  gemini:
    model: gemini-2.5-flash
    api_key_env: GEMINI_API_KEY
  openai:
    model: gpt-4o
    api_key_env: OPENAI_API_KEY

# 物体滑落检测（质检规范序号 21，多模态）
# 与 regrasp 共用架构，但判据不同（非其子集）：看「持有结束时夹爪是否仍闭合」。
# 思路：本地抽帧 → 模型逐帧、逐夹爪回 {side, holding, gripper_closed, object_label, confidence}
#   → 代码侧逐臂去抖后，对每个"持有段"末尾检查其后窗口内夹爪状态：仍闭合却已脱手 → 滑落；
#   张开放下 → 正常。每只机械臂单目标，逐臂分别判定。判定确定可复现。
# 注意：调用付费多模态 API，需安装对应后端依赖并设置 API key，同时把 checks.object_slip 设为 true。
#   gemini: pip install -e ".[gemini]" + 环境变量 GEMINI_API_KEY
#   openai: pip install -e ".[openai]" + 环境变量 OPENAI_API_KEY
# 缺 key / SDK / 接口异常 / 抽帧失败时降级为 WARN，不阻塞流水线。
object_slip:
  severity: warn
  provider: gemini          # gemini / openai（仅 image 逐帧模式）
  sample_fps: 2.0           # 抽帧采样率（建议 >=2，决定持有/释放/滑落的时间分辨率）
  frame_max_h: 360          # 抽帧下采样高度（省 token）
  max_frames: 120           # 单视频抽帧上限（长视频自动降采样以覆盖全片）
  min_hold_sec: 0.5         # 一段"持有"至少持续这么久才算有效抓取（去抖；下限 2 帧）
  min_release_sec: 1.0      # 持有之间的"释放"至少这么久才算真脱手（桥接遮挡闪断；下限 2 帧）
  release_window_sec: 0.5   # 持有结束后检查夹爪状态的窗口时长（下限 1 帧）
  min_confidence: 0.0       # 低于此置信度的"持有"判定按未持有处理（0=不启用）
  # ---- parquet 夹爪真实信号（§2.3）：判据 gripper_closed 优先取自 LeRobot parquet ----
  # 视频位于 LeRobot v3.0 组内、能定位到同 episode parquet 且装有 pyarrow 时优先生效；
  # 否则逐臂自动回退到模型推断的 gripper_closed（行为同改造前）。装 pyarrow: pip install -e ".[lerobot]"
  use_parquet_gripper: true     # 关闭则始终用模型推断的夹爪状态
  gripper_closed_is_low: true   # 夹爪开合值越小=越闭合（多数 LeRobot/RoboMIND 约定；按组实测可改）
  gripper_closed_frac: 0.5      # 归一化开合值 ≤ 此比例判为闭合（closed_is_low 时）
  gripper_min_span: 1.0e-6      # 整段开合区间小于此（夹爪几乎不动）则视为不可判，回退保守
  temperature: 0.0
  timeout: 120.0
  gemini:
    model: gemini-2.5-flash
    api_key_env: GEMINI_API_KEY
  openai:
    model: gpt-4o
    api_key_env: OPENAI_API_KEY

# 操作物与桌面颜色相同检测（质检规范序号 19，多模态）
# 静态属性（整段一个结论），无需时序状态机：本地少量抽帧 → 模型逐帧回
#   {hard_to_distinguish, object_label, confidence} → 代码侧在能识别出被操作物体的帧里，
#   "难分辨"帧占比 ≥ hit_ratio 即命中。因"难分辨"带主观性，命中默认 WARN（人工复核）。
# 注意：调用付费多模态 API，需安装对应后端依赖并设置 API key，同时把 checks.colormatch 设为 true。
#   gemini: pip install -e ".[gemini]" + 环境变量 GEMINI_API_KEY
#   openai: pip install -e ".[openai]" + 环境变量 OPENAI_API_KEY
# 缺 key / SDK / 接口异常 / 抽帧失败时降级为 WARN，不阻塞流水线。
colormatch:
  severity: warn            # 命中时的严重级别：warn / fail
  provider: gemini          # gemini / openai（仅 image 逐帧模式）
  sample_fps: 1.0           # 抽帧采样率（静态属性，低采样即可省成本）
  frame_max_h: 360          # 抽帧下采样高度（省 token）
  max_frames: 16            # 单视频抽帧上限（静态属性，少量均匀帧覆盖全片即可）
  hit_ratio: 0.5            # 能识别物体的帧里"难分辨"占比 ≥ 此值即命中
  min_judged_frames: 2      # 有效判定帧数下限，低于此报 WARN(无法评估)避免单帧误判
  min_confidence: 0.0       # 低于此置信度的帧判定跳过(不计入)（0=不启用）
  temperature: 0.0
  timeout: 120.0
  gemini:
    model: gemini-2.5-flash
    api_key_env: GEMINI_API_KEY
  openai:
    model: gpt-4o
    api_key_env: OPENAI_API_KEY

# 夹取位置过于极限检测（质检规范序号 16，多模态）
# 规范：抓取的是物体边缘而不是主体——夹爪应夹在物体主体/重心附近，夹在边缘/棱角/极限位置
#   容易夹不稳、夹偏或脱手。与 colormatch 同属「逐帧独立判 + 占比聚合」（无需时序状态机）：
#   本地抽帧 → 模型逐帧回 {edge_grasp, object_label, confidence}（只对「看清夹爪正夹住物体」的帧返回）
#   → 代码侧在能判定的帧里，「夹在边缘」帧占比 ≥ hit_ratio 即命中。因「边缘 vs 主体」带主观性，
#   命中默认 WARN（人工复核）。
# 注意：调用付费多模态 API，需安装对应后端依赖并设置 API key，同时把 checks.edge_grasp 设为 true。
#   gemini: pip install -e ".[gemini]" + 环境变量 GEMINI_API_KEY
#   openai: pip install -e ".[openai]" + 环境变量 OPENAI_API_KEY
# 缺 key / SDK / 接口异常 / 抽帧失败时降级为 WARN，不阻塞流水线。
edge_grasp:
  severity: warn            # 命中时的严重级别：warn / fail
  provider: gemini          # gemini / openai（仅 image 逐帧模式）
  sample_fps: 2.0           # 抽帧采样率（需看清夹取瞬间的接触点，建议 >=2）
  frame_max_h: 360          # 抽帧下采样高度（省 token）
  max_frames: 60            # 单视频抽帧上限（长视频自动降采样以覆盖全片）
  hit_ratio: 0.5            # 能判定的帧里"夹在边缘"占比 ≥ 此值即命中
  min_judged_frames: 2      # 有效判定帧数下限，低于此报 WARN(无法评估)避免单帧误判
  min_confidence: 0.0       # 低于此置信度的帧判定跳过(不计入)（0=不启用）
  temperature: 0.0
  timeout: 120.0
  gemini:
    model: gemini-2.5-flash
    api_key_env: GEMINI_API_KEY
  openai:
    model: gpt-4o
    api_key_env: OPENAI_API_KEY

output:
  fail_on_error: true
  include_passed: false
